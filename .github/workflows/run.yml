name: Water Data Crawler Service

on:
  push:
    branches: [ "main" ]
  schedule:
    # 这里的 cron 表达式表示每 3 小时自动运行一次 (可选)
    - cron: '0 */3 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. 安装所有依赖 (关键修复点)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 必须安装 main.py 调用的所有库
          pip install requests beautifulsoup4 pandas playwright
          # 如果你的爬虫使用了 playwright 引擎，需要执行下面这行
          playwright install chromium

      # 4. 执行爬虫主程序
      - name: Run Crawler
        run: |
          python main.py
        env:
          # 如果有敏感信息可以在这里配置
          PYTHONPATH: .

      # 5. 上传运行结果 (如果有生成的 CSV 或截图)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crawl-results
          path: |
            *.csv
            *.xlsx
            error_debug.png
