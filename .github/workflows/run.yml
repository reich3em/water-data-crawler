name: Daily Table Scraper

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点运行
  workflow_dispatch:      # 允许你在网页上手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖包
        run: |
          pip install pandas lxml html5lib requests

      - name: 执行抓取脚本
        run: python main.py

      - name: 提交并保存数据到仓库
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "自动更新水情数据: $(date)" || exit 0
          git push
